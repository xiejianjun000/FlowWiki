[retrieval]
engine = "bm25"
fallback_engines = ["nano-graphrag", "lightrag"]

[bm25]
k1 = 1.2
b = 0.75
min_token_length = 2

[nano-graphrag]
enabled = true
max_depth = 3
top_k = 10

[lightrag]
enabled = false
api_key = ""
model = "text-embedding-3-small"

[ingest]
auto_compile = true
compile_interval = "30m"
max_workers = 4

[ace]
enabled = true
reflector_threshold = 0.8
curator_override = true

[memory]
card_limit = 10000
auto_prune = true
prune_threshold = 0.3

[skill]
cache_enabled = true
cache_ttl = "1h"

[hermes]
# Hermes AI 框架 — 知识库质量验证
# 使用本地 Hermes 主模型（DeepSeek）做 LLM 级别质量评审
# api_key 留空则自动从环境变量 DEEPSEEK_API_KEY 读取
api_url = "https://api.deepseek.com/v1/chat/completions"
api_key = ""
model = "deepseek-chat"
timeout = 60

[logging]
level = "INFO"
format = "json"
file = "flowwiki.log"

[industry]
default = "root-cause"
switch_enabled = true

[locale]
# 语言设置：zh=中文目录名，en=英文目录名（默认）
# 首次运行 _scripts/setup.sh 会自动检测并设置
lang = "zh"
auto_detect = true

[okf]
# OKF（Open Knowledge Format）— 可移植知识交换格式（对齐 llm-wiki-compiler v1.x + Google Cloud 标准）
enabled = true
export_dir = "./okf_export"
auto_import_quarantine = true
verify_signature = false

[storage]
path = "./storage"
backup_enabled = true
backup_interval = "24h"