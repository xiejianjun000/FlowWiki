<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1536" height="864">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#07112a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Large decorative circles -->
  <circle cx="900" cy="150" r="250" fill="#0ea5e9" opacity="0.05" filter="url(#blur)"/>
  <circle cx="200" cy="500" r="200" fill="#7b61ff" opacity="0.05" filter="url(#blur)"/>
  <circle cx="600" cy="350" r="180" fill="#14b8a6" opacity="0.04" filter="url(#blur)"/>

  <!-- Knowledge graph: nodes -->
  <g opacity="0.15">
    <circle cx="100" cy="200" r="4" fill="#0ea5e9"/>
    <circle cx="180" cy="150" r="3" fill="#7b61ff"/>
    <circle cx="250" cy="300" r="5" fill="#14b8a6"/>
    <circle cx="350" cy="180" r="3" fill="#0ea5e9"/>
    <circle cx="400" cy="400" r="4" fill="#7b61ff"/>
    <circle cx="500" cy="250" r="3" fill="#14b8a6"/>
    <circle cx="580" cy="150" r="4" fill="#0ea5e9"/>
    <circle cx="650" cy="350" r="5" fill="#7b61ff"/>
    <circle cx="700" cy="200" r="3" fill="#14b8a6"/>
    <circle cx="800" cy="450" r="4" fill="#0ea5e9"/>
    <circle cx="850" cy="250" r="3" fill="#7b61ff"/>
    <circle cx="950" cy="350" r="5" fill="#14b8a6"/>
    <circle cx="1050" cy="200" r="4" fill="#0ea5e9"/>
    <circle cx="1100" cy="450" r="3" fill="#7b61ff"/>
    <circle cx="950" cy="550" r="4" fill="#14b8a6"/>
    <circle cx="750" cy="550" r="3" fill="#0ea5e9"/>
    <circle cx="550" cy="500" r="5" fill="#7b61ff"/>
    <circle cx="300" cy="550" r="4" fill="#14b8a6"/>
    <circle cx="150" cy="450" r="3" fill="#0ea5e9"/>
    <circle cx="450" cy="350" r="4" fill="#7b61ff"/>
  </g>

  <!-- Knowledge graph: connections -->
  <g opacity="0.08" stroke="#0ea5e9" stroke-width="1" fill="none">
    <line x1="100" y1="200" x2="180" y2="150"/>
    <line x1="180" y1="150" x2="350" y2="180"/>
    <line x1="250" y1="300" x2="400" y2="400"/>
    <line x1="350" y1="180" x2="500" y2="250"/>
    <line x1="400" y1="400" x2="550" y2="500"/>
    <line x1="500" y1="250" x2="650" y2="350"/>
    <line x1="580" y1="150" x2="700" y2="200"/>
    <line x1="650" y1="350" x2="800" y2="450"/>
    <line x1="700" y1="200" x2="850" y2="250"/>
    <line x1="800" y1="450" x2="950" y2="350"/>
    <line x1="850" y1="250" x2="950" y2="350"/>
    <line x1="950" y1="350" x2="1050" y2="200"/>
    <line x1="950" y1="550" x2="750" y2="550"/>
    <line x1="750" y1="550" x2="550" y2="500"/>
    <line x1="550" y1="500" x2="300" y2="550"/>
    <line x1="300" y1="550" x2="150" y2="450"/>
    <line x1="450" y1="350" x2="550" y2="500"/>
    <line x1="450" y1="350" x2="650" y2="350"/>
  </g>

  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="96" font-weight="900" fill="url(#glow)" filter="url(#textGlow)" letter-spacing="4">FlowWiki</text>

  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="400" fill="#94a3b8" letter-spacing="1">Knowledge Compounds Like Code. FlowWiki is the Compiler.</text>

  <!-- Accent line -->
  <line x1="400" y1="390" x2="800" y2="390" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtitle 2 -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#64748b">AI 与人类协同复利的知识库方法论 · 7 层架构 · ACE 防幻觉 · 开源 MIT</text>

  <!-- GitHub link -->
  <rect x="460" y="500" rx="20" ry="20" width="280" height="44" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="600" y="528" text-anchor="middle" font-family="monospace" font-size="18" fill="#94a3b8">github.com/xiejianjun000/FlowWiki</text>
</svg>
