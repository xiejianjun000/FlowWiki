# 法典取代映射表
# 用途：lint.py check_obsolete_references() 扫描 wiki/ 中引用已废止法律的 wikilink
# 依据：2026.8.15《中华人民共和国生态环境法典》施行后废止的 10 部法律
# 维护：用户报告"概念页正文还在引用已废止的法律条文"问题
# 更新：2026-07-19

repealed_date: "2026-08-15"
replacing_code: "中华人民共和国生态环境法典（2026）"

# 被废止法律 → 法典对应位置
# key: 被废止法律的常见引用名（wikilink 可能用到的各种写法）
# value: 法典中的对应位置 + 备注
repealed_laws:
  中华人民共和国环境保护法:
    code_location: "法典第一编 总则"
    note: "已被法典总纲吸收，作为基础文件仍有历史参考价值"
    common_aliases:
      - "环境保护法"
      - "环保法"

  中华人民共和国环境影响评价法:
    code_location: "法典第三编 环境影响评价"
    note: "环评制度整合入法典第三编"
    common_aliases:
      - "环境影响评价法"
      - "环评法"

  中华人民共和国大气污染防治法:
    code_location: "法典第二编 大气污染防治"
    note: "大气污染防治专编"
    common_aliases:
      - "大气污染防治法"
      - "大气法"

  中华人民共和国水污染防治法:
    code_location: "法典第二编 水污染防治"
    note: "水污染防治专编"
    common_aliases:
      - "水污染防治法"
      - "水污法"

  中华人民共和国土壤污染防治法:
    code_location: "法典第二编 土壤污染防治"
    note: "土壤污染防治专编"
    common_aliases:
      - "土壤污染防治法"
      - "土壤法"

  中华人民共和国固体废物污染环境防治法:
    code_location: "法典第二编 固体废物污染防治"
    note: "固废法，含危废管理条款"
    common_aliases:
      - "固体废物污染环境防治法"
      - "固废法"
      - "固废污染环境防治法"

  中华人民共和国噪声污染防治法:
    code_location: "法典第二编 噪声污染防治"
    note: "噪声污染防治专编"
    common_aliases:
      - "噪声污染防治法"
      - "噪声法"

  中华人民共和国放射性污染防治法:
    code_location: "法典第二编 放射性污染防治"
    note: "放射性污染防治专编"
    common_aliases:
      - "放射性污染防治法"
      - "放射法"

  中华人民共和国海洋环境保护法:
    code_location: "法典第二编 海洋环境保护"
    note: "海洋环境保护专编"
    common_aliases:
      - "海洋环境保护法"
      - "海环法"

  中华人民共和国清洁生产促进法:
    code_location: "法典第四编 清洁生产与循环经济"
    note: "清洁生产制度整合入法典第四编"
    common_aliases:
      - "清洁生产促进法"
      - "清洁生产法"

# lint 检查规则
lint_rules:
  # 2026.8.15 前的过渡期：仅警告，不报错
  transition_period_end: "2026-08-15"
  severity_before_repeal: "warning"
  severity_after_repeal: "error"

  # 检查范围：wikilink 中是否引用了上述法律名
  check_patterns:
    - "\\[\\[.*环境保护法.*\\]\\]"
    - "\\[\\[.*环境影响评价法.*\\]\\]"
    - "\\[\\[.*大气污染防治法.*\\]\\]"
    - "\\[\\[.*水污染防治法.*\\]\\]"
    - "\\[\\[.*土壤污染防治法.*\\]\\]"
    - "\\[\\[.*固体废物.*\\]\\]"
    - "\\[\\[.*噪声污染防治法.*\\]\\]"
    - "\\[\\[.*放射性污染防治法.*\\]\\]"
    - "\\[\\[.*海洋环境保护法.*\\]\\]"
    - "\\[\\[.*清洁生产促进法.*\\]\\]"
