name: "审计准备"
slug: "audit-prep"
domain: "generic"
subdomain: "audit_preparation"
perspective: "enterprise"

raw_sources:
  laws:
    - 审计法
    - 会计法
    - 企业内部控制基本规范
  standards:
    - ISO 9001 质量管理体系
    - GB/T 19001 质量管理体系要求
    - 内部审计基本准则
  datasets:
    - 企业合规自查清单
    - 审计材料模板库

wiki_structure:
  concepts:
    - 审计合规要求
    - 风险排查方法
    - 材料准备规范
  playbooks:
    - 审计准备全流程
    - 合规自查操作指南
    - 风险排查五步法
  comparisons:
    - 内部审计 vs 外部审计 vs 日常检查
    - 专项审计 vs 综合审计

scenarios:
  - id: compliance-checklist
    name: "合规自查清单生成"
    trigger: "用户询问审计准备事项"
    skills: [清单编制, 法规检索, 标准匹配]
  - id: material-prep
    name: "审计材料准备"
    trigger: "用户询问需要准备的材料"
    skills: [文书规范, 清单编制]
  - id: risk-screening
    name: "问题预判与风险排查"
    trigger: "用户描述企业情况"
    skills: [风险识别, 影响分析, 合规建议]

industry_skills:
  - name: "清单编制"
    file: ".agents/skills/checklist-compile/SKILL.md"
  - name: "风险识别"
    file: ".agents/skills/risk-identification/SKILL.md"
  - name: "文书规范"
    file: ".agents/skills/document-norm/SKILL.md"
  - name: "合规建议"
    file: ".agents/skills/compliance-suggestion/SKILL.md"
  - name: "法规检索"
    file: ".agents/skills/regulation-search/SKILL.md"
  - name: "标准匹配"
    file: ".agents/skills/standard-match/SKILL.md"
  - name: "影响分析"
    file: ".agents/skills/impact-analysis/SKILL.md"
