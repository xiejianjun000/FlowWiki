name: "督察现场"
slug: "inspection-onsite"
gb_code: "M7460"
domain: "environmental"
subdomain: "inspection"
perspective: "inspector"

raw_sources:
  laws:
    - 环境保护法
    - 大气污染防治法
    - 水污染防治法
    - 土壤污染防治法
    - 固体废物污染环境防治法
  standards:
    - GB 3095-2012 环境空气质量标准
    - GB 3838-2002 地表水环境质量标准
    - GB 15618-2018 土壤环境质量标准
  datasets:
    - 督察问题台账
    - 整改验收记录

wiki_structure:
  concepts:
    - 督察问题定性
    - 证据固定规范
    - 整改验收标准
  playbooks:
    - 督察现场研判流程
    - 证据固定操作指南
    - 整改建议编制流程
  comparisons:
    - 中央督察 vs 省级督察
    - 生态环境损害 vs 一般违规

scenarios:
  - id: issue-assessment
    name: "现场问题研判"
    trigger: "用户描述督察现场发现的问题"
    skills: [风险识别, 判据匹配, 法规检索]
  - id: evidence-fixing
    name: "证据固定指引"
    trigger: "用户询问现场取证要求"
    skills: [证据审核, 文书规范]
  - id: rectification
    name: "整改建议生成"
    trigger: "用户要求生成整改方案"
    skills: [合规建议, 影响分析]

industry_skills:
  - name: "风险识别"
    file: ".agents/skills/risk-identification/SKILL.md"
  - name: "证据审核"
    file: ".agents/skills/evidence-review/SKILL.md"
  - name: "法规检索"
    file: ".agents/skills/regulation-search/SKILL.md"
  - name: "文书规范"
    file: ".agents/skills/document-norm/SKILL.md"
  - name: "合规建议"
    file: ".agents/skills/compliance-suggestion/SKILL.md"
  - name: "影响分析"
    file: ".agents/skills/impact-analysis/SKILL.md"
