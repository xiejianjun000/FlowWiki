version: "3.8"

services:
  flowwiki:
    build: .
    image: flowwiki:latest
    container_name: flowwiki
    volumes:
      # Mount your knowledge vault (read-write for wiki/, read-only for raw/)
      - ./raw:/app/raw:ro
      - ./wiki:/app/wiki
      - ./00_腰뽭〉:/app/00_腰뽭〉
      - ./.memory:/app/.memory
      - ./storage:/app/storage
      - ./config.toml:/app/config.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # MCP Server - exposes FlowWiki tools via stdio for AI agents
  mcp-server:
    build: .
    image: flowwiki:latest
    container_name: flowwiki-mcp
    command: python _scripts/mcp_server.py
    volumes:
      - ./raw:/app/raw:ro
      - ./wiki:/app/wiki
      - ./00_腰뽭〉:/app/00_腰뽭〉
      - ./.memory:/app/.memory
      - ./storage:/app/storage
      - ./config.toml:/app/config.toml:ro
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    restart: unless-stopped
    profiles:
      - mcp
