name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-test:
    name: End-to-end tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run E2E tests
        run: python _scripts/e2e_test.py

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: wiki/meta/e2e-test-report.md
          retention-days: 30

  lint-check:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run lint
        run: |
          python -c "
          import sys
          from pathlib import Path

          errors = []
          base = Path('.')

          # 1. wiki markdown 必须有 frontmatter（排除 README/index/log/meta）
          for f in base.glob('wiki/**/*.md'):
              if f.name in ('README.md', 'index.md', 'log.md'):
                  continue
              if 'meta' in f.parts:
                  continue
              content = f.read_text(encoding='utf-8')
              if not content.startswith('---'):
                  errors.append(f'Missing frontmatter: {f}')

          # 2. 双索引存在性
          if not (base / 'wiki/index.md').exists():
              errors.append('wiki/index.md missing')
          if not (base / '00_首页/README.md').exists():
              errors.append('00_首页/README.md missing')

          # 3. .gitignore 存在
          if not (base / '.gitignore').exists():
              errors.append('.gitignore missing')

          # 4. SCHEMA.md 存在
          if not (base / 'SCHEMA.md').exists():
              errors.append('SCHEMA.md missing')

          if errors:
              for e in errors:
                  print(f'  LINT ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          else:
              print('All lint checks passed.')
          "
